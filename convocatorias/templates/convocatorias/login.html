{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesion</title>
    <link rel="stylesheet" href="{% static 'convocatorias/CSS/shared.css' %}?v=20260215b">
    <link rel="stylesheet" href="{% static 'convocatorias/CSS/auth.css' %}">
</head>
<body class="auth">

<nav class="topbar">
    <div class="brand">
        <img src="{% static 'convocatorias/img/logo-ayuntamiento.png' %}" alt="Ayuntamiento de Acapulco">
        <span>Convocatorias Digitales</span>
    </div>
    <div class="topbar-actions">
        <button class="theme-toggle" id="themeToggle" type="button">
            <span>Modo oscuro</span>
        </button>
        <a class="link-pill" href="{% url 'home' %}">Inicio</a>
        <a class="link-pill" href="{% url 'registro' %}">Registrarse</a>
    </div>
</nav>

<header class="hero small">
    <h1>Bienvenido</h1>
    <p>Acceso seguro al sistema de convocatorias digitales</p>
</header>

<main class="auth-main auth-single">
    <div class="auth-grid">
        <section class="form-card">
            <h2 class="section-title">Iniciar sesion</h2>
            {% if messages %}
                <div class="helper">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            <form method="post" action="#">
                {% csrf_token %}
                <div class="form-group">
                    <label for="email">Correo electronico</label>
                    <input class="input" id="email" name="email" type="email" placeholder="usuario@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <input class="input" id="password" name="password" type="password" placeholder="********" required>
                </div>
                <div class="actions">
                    <button class="btn" type="submit">Ingresar</button>
                </div>
                <div class="actions">
                    <a class="btn btn-outline" href="{% url 'password_reset' %}">Olvidaste tu contrasena?</a>
                </div>
            </form>
        </section>
    </div>
</main>

<script src="{% static 'convocatorias/js/theme.js' %}"></script>
</body>
</html>
