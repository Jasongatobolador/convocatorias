{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificación de seguridad</title>
    <link rel="stylesheet" href="{% static 'convocatorias/CSS/shared.css' %}">
    <link rel="stylesheet" href="{% static 'convocatorias/CSS/usuario.css' %}">
</head>
<body class="usuario">

<nav class="topbar">
    <div class="brand">
        <img src="{% static 'convocatorias/img/logo-ayuntamiento.png' %}" alt="Ayuntamiento de Acapulco">
        <span>Convocatorias Digitales</span>
    </div>
    <div class="topbar-actions">
        <a class="link-pill" href="{% url 'zona_usuario' %}">Zona de usuario</a>
    </div>
</nav>

<header class="hero compacto">
    <h1>Verificación requerida</h1>
    <p>Confirma tu identidad para cambiar datos sensibles.</p>
</header>

<main class="main-wrap">
    <section class="panel">
        <h2 class="section-title">Ingresar token de seguridad</h2>
        <form method="post" action="#">
            {% csrf_token %}
            <div class="form-group">
                <label for="token">Token enviado a tu correo</label>
                <input class="input" id="token" name="token" type="text" placeholder="Ej. 482193" required>
            </div>
            <div class="actions">
                <button class="btn" type="submit">Validar token</button>
                <button class="btn btn-outline" type="button">Reenviar código</button>
            </div>
        </form>
        <p class="helper">Este paso asegura que solo el propietario de la cuenta realice cambios.</p>
    </section>
</main>

</body>
</html>
