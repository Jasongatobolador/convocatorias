{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Convocatorias digitales</title>
    <link rel="stylesheet" href="{% static 'convocatorias/CSS/shared.css' %}?v=20260215b">
    <link rel="stylesheet" href="{% static 'convocatorias/CSS/auth.css' %}">
</head>
<body class="auth">

<nav class="topbar">
    <div class="brand">
        <img src="{% static 'convocatorias/img/logo-ayuntamiento.png' %}" alt="Ayuntamiento de Acapulco">
        <span>Convocatorias Digitales</span>
    </div>
    <div class="topbar-actions">
        <button class="theme-toggle" id="themeToggle" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
            </svg>
            <span>Modo oscuro</span>
        </button>
    </div>
</nav>

<header class="hero small">
    <h1>Selecciona el acceso</h1>
    <p>Elige el perfil correspondiente para continuar</p>
</header>

<main class="auth-main auth-single">
    <div class="auth-grid">
        <section class="form-card">
            <h2 class="section-title">Entrar al sistema</h2>
            <div class="actions">
                <a class="btn" href="{% url 'login' %}">Login usuario</a>
            </div>
            <div class="actions">
                <a class="btn btn-outline" href="{% url 'admin_logout_redirect' %}">Login administrador</a>
            </div>
            <div class="actions">
                <a class="btn btn-outline" href="{% url 'login_trabajador' %}">Login trabajador</a>
            </div>
        </section>
    </div>
</main>

<script src="{% static 'convocatorias/js/theme.js' %}"></script>
</body>
</html>
