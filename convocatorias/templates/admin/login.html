{% load i18n static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona de Administrador — Área de Desarrollo Económico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100vh;
            background: linear-gradient(160deg, #5c1f1f 0%, #7b2d2d 50%, #5c1f1f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            padding: 30px 20px;
        }

        /* ── Tarjeta central ────────────────────────────── */
        .card {
            width: 100%;
            max-width: 430px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(212,175,55,0.55);
            border-radius: 22px;
            padding: 44px 40px 38px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            animation: aparecer 0.65s ease;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Cabecera ───────────────────────────────────── */
        .cabecera { text-align: center; margin-bottom: 32px; }
        .icono { font-size: 3rem; display: block; margin-bottom: 12px; }

        .titulo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #d4af37;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .subtitulo {
            font-size: 0.88rem;
            color: rgba(245,230,200,0.72);
        }

        /* ── Campos ─────────────────────────────────────── */
        .campo { margin-bottom: 18px; }

        .campo label {
            display: block;
            font-weight: 700;
            font-size: 0.9rem;
            color: #f5e6c8;
            margin-bottom: 7px;
        }

        .input-wrap { position: relative; }

        .campo input {
            width: 100%;
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(212,175,55,0.42);
            border-radius: 12px;
            color: #fff;
            padding: 11px 44px 11px 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.97rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .campo input:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.22);
        }

        /* ── Botón ojo ──────────────────────────────────── */
        .ojo {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.05rem;
            color: rgba(212,175,55,0.7);
            padding: 4px;
            transition: color 0.2s;
        }
        .ojo:hover { color: #d4af37; }

        /* ── Error ──────────────────────────────────────── */
        .error-box {
            background: rgba(192,57,43,0.2);
            border: 1px solid rgba(192,57,43,0.5);
            border-radius: 12px;
            color: #ffaaaa;
            padding: 11px 14px;
            font-size: 0.9rem;
            margin-bottom: 18px;
            font-weight: 600;
        }

        /* ── Botón login ────────────────────────────────── */
        .btn-login {
            width: 100%;
            background: linear-gradient(180deg, #d4af37 0%, #b8942a 100%);
            color: #5c1f1f;
            border: none;
            border-radius: 30px;
            padding: 13px 0;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.4px;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="cabecera">
            <span class="icono">🛡️</span>
            <p class="titulo">Zona de Administrador</p>
            <p class="subtitulo">Área de Desarrollo Económico</p>
        </div>

        {% if form.errors %}
        <div class="error-box">
            Credenciales incorrectas. Verifica tu usuario y contraseña.
        </div>
        {% endif %}

        {% if user_is_anonymous %}
        <form method="post" action="{{ app_path }}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="campo">
                <label for="id_username">Usuario</label>
                <div class="input-wrap">
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        autocomplete="username"
                        autofocus
                        maxlength="254"
                        placeholder="Nombre de usuario"
                        value="{{ form.username.value|default:'' }}"
                    >
                </div>
            </div>

            <div class="campo">
                <label for="id_password">Contraseña</label>
                <div class="input-wrap">
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        autocomplete="current-password"
                        placeholder="••••••••"
                    >
                    <button type="button" class="ojo" id="btnOjo" title="Ver contraseña">👁</button>
                </div>
            </div>

            <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>
        {% endif %}
    </div>

    <script>
        (function () {
            var btn   = document.getElementById('btnOjo');
            var campo = document.getElementById('id_password');
            if (!btn || !campo) return;
            btn.addEventListener('click', function () {
                var esPass = campo.type === 'password';
                campo.type     = esPass ? 'text' : 'password';
                btn.textContent = esPass ? '🙈' : '👁';
                btn.title       = esPass ? 'Ocultar contraseña' : 'Ver contraseña';
            });
        })();
    </script>
</body>
</html>
