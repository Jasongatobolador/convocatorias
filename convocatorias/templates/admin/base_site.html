{% extends "admin/base.html" %}

{% block title %}Área de Administración{% endblock %}

{% block branding %}
<h1 id="site-name">
    Área de Administración
</h1>
{% endblock %}

{% block nav-global %}
{% if not user.is_authenticated %}
<style>
#theme-toggle-login {
    position: fixed;
    top: 10px;
    right: 16px;
    z-index: 9999;
    background: none;
    border: none;
    cursor: pointer;
    color: #fff;
    padding: 4px;
}
</style>
<button id="theme-toggle-login" type="button" title="Cambiar tema">
    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
    </svg>
</button>
<script>
(function(){
    var btn = document.getElementById('theme-toggle-login');
    var stored = localStorage.getItem('django-admin-interface-color-theme');
    if (stored === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
    btn.addEventListener('click', function(){
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('django-admin-interface-color-theme', next);
    });
})();
</script>
{% endif %}
{% endblock %}
